plugin: amazon.aws.aws_ec2
regions:
  - us-east-1
  - us-west-1
filters:
  instance-state-name: running

# SSH connection
hostnames:
  - tag:Name
  - dns-name
  - ip-address
  - instance-id
compose:
  ansible_host: public_ip_address

# SSM connection (uncomment below and comment SSH section above to switch)
# hostnames:
#   - instance-id
# compose:
#   ansible_host: instance_id
#   ansible_connection: "'amazon.aws.aws_ssm'"
#   ansible_aws_ssm_region: placement.region
#   ansible_aws_ssm_bucket_name: "'s3-bucket'"
